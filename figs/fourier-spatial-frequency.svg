<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-labelledby="title desc">
  <title id="title">空间域与频率域示意图</title>
  <desc id="desc">空间域关注像素位置和灰度值，频率域关注灰度变化快慢</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="900" height="320" fill="#ffffff"/>
  <g font-family="Microsoft YaHei, Arial">
    <text x="58" y="42" font-size="22" fill="#111827">空间域</text>
    <rect x="60" y="72" width="240" height="180" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <g transform="translate(85,95)">
      <rect width="40" height="40" fill="#e2e8f0"/>
      <rect x="40" width="40" height="40" fill="#cbd5e1"/>
      <rect x="80" width="40" height="40" fill="#94a3b8"/>
      <rect x="120" width="40" height="40" fill="#475569"/>
      <rect y="40" width="40" height="40" fill="#f1f5f9"/>
      <rect x="40" y="40" width="40" height="40" fill="#e2e8f0"/>
      <rect x="80" y="40" width="40" height="40" fill="#64748b"/>
      <rect x="120" y="40" width="40" height="40" fill="#1f2937"/>
      <rect y="80" width="40" height="40" fill="#f8fafc"/>
      <rect x="40" y="80" width="40" height="40" fill="#cbd5e1"/>
      <rect x="80" y="80" width="40" height="40" fill="#94a3b8"/>
      <rect x="120" y="80" width="40" height="40" fill="#111827"/>
    </g>
    <text x="85" y="282" font-size="16" fill="#475569">像素位置 + 灰度值</text>
    <line x1="335" y1="160" x2="455" y2="160" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="355" y="135" font-size="17" fill="#475569">傅里叶变换</text>
    <text x="590" y="42" font-size="22" fill="#111827">频率域</text>
    <rect x="565" y="72" width="240" height="180" rx="8" fill="#111827"/>
    <circle cx="685" cy="162" r="20" fill="#f8fafc"/>
    <circle cx="685" cy="162" r="54" fill="none" stroke="#94a3b8" stroke-width="4"/>
    <circle cx="685" cy="162" r="84" fill="none" stroke="#475569" stroke-width="3"/>
    <circle cx="620" cy="108" r="5" fill="#e5e7eb"/>
    <circle cx="750" cy="220" r="5" fill="#e5e7eb"/>
    <circle cx="765" cy="115" r="4" fill="#cbd5e1"/>
    <text x="585" y="282" font-size="16" fill="#475569">中心低频，外围高频</text>
  </g>
</svg>
