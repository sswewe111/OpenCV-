<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">边缘梯度方向示意图</title>
  <desc id="desc">x 方向梯度检测垂直边缘，y 方向梯度检测水平边缘</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="900" height="300" fill="#ffffff"/>
  <g font-family="Microsoft YaHei, Arial">
    <text x="80" y="45" font-size="22" fill="#111827">x 方向梯度</text>
    <rect x="70" y="70" width="230" height="160" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="70" y="70" width="115" height="160" rx="8" fill="#111827"/>
    <rect x="185" y="70" width="115" height="160" rx="8" fill="#f1f5f9"/>
    <line x1="145" y1="150" x2="225" y2="150" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="185" y1="78" x2="185" y2="222" stroke="#dc2626" stroke-width="4"/>
    <text x="95" y="260" font-size="17" fill="#475569">左右灰度突变 -> 垂直边缘</text>
    <text x="560" y="45" font-size="22" fill="#111827">y 方向梯度</text>
    <rect x="540" y="70" width="230" height="160" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="540" y="70" width="230" height="80" rx="8" fill="#111827"/>
    <rect x="540" y="150" width="230" height="80" rx="8" fill="#f1f5f9"/>
    <line x1="655" y1="115" x2="655" y2="190" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="548" y1="150" x2="762" y2="150" stroke="#2563eb" stroke-width="4"/>
    <text x="568" y="260" font-size="17" fill="#475569">上下灰度突变 -> 水平边缘</text>
  </g>
</svg>
