<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">轮廓检测流程示意图</title>
  <desc id="desc">从原图到灰度图、二值图、查找轮廓和绘制轮廓的流程</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="280" fill="#ffffff"/>
  <g font-family="Microsoft YaHei, Arial">
    <text x="40" y="42" font-size="22" fill="#111827">轮廓检测基本流程</text>
    <g transform="translate(45,82)">
      <rect width="130" height="110" rx="8" fill="#e0f2fe" stroke="#bae6fd"/>
      <circle cx="68" cy="56" r="34" fill="#38bdf8"/>
      <text x="65" y="145" font-size="16" fill="#475569" text-anchor="middle">原图</text>
    </g>
    <line x1="190" y1="136" x2="240" y2="136" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(255,82)">
      <rect width="130" height="110" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <circle cx="68" cy="56" r="34" fill="#94a3b8"/>
      <text x="65" y="145" font-size="16" fill="#475569" text-anchor="middle">灰度图</text>
    </g>
    <line x1="400" y1="136" x2="450" y2="136" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(465,82)">
      <rect width="130" height="110" rx="8" fill="#111827"/>
      <circle cx="68" cy="56" r="34" fill="#f8fafc"/>
      <text x="65" y="145" font-size="16" fill="#475569" text-anchor="middle">二值图</text>
    </g>
    <line x1="610" y1="136" x2="660" y2="136" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(675,82)">
      <rect width="160" height="110" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
      <circle cx="80" cy="56" r="34" fill="none" stroke="#dc2626" stroke-width="6"/>
      <text x="80" y="145" font-size="16" fill="#475569" text-anchor="middle">轮廓结果</text>
    </g>
  </g>
</svg>
