<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">腐蚀与膨胀示意图</title>
  <desc id="desc">腐蚀使白色前景缩小，膨胀使白色前景扩大</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="900" height="300" fill="#ffffff"/>
  <g font-family="Microsoft YaHei, Arial">
    <text x="80" y="45" font-size="22" fill="#111827">原始前景</text>
    <rect x="65" y="70" width="180" height="180" rx="8" fill="#111827"/>
    <rect x="112" y="117" width="86" height="86" fill="#f8fafc"/>
    <circle cx="205" cy="95" r="8" fill="#f8fafc"/>
    <line x1="270" y1="160" x2="350" y2="160" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="280" y="137" font-size="18" fill="#475569">腐蚀</text>
    <rect x="380" y="70" width="180" height="180" rx="8" fill="#111827"/>
    <rect x="440" y="130" width="60" height="60" fill="#f8fafc"/>
    <text x="410" y="45" font-size="22" fill="#111827">前景缩小</text>
    <line x1="585" y1="160" x2="665" y2="160" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="595" y="137" font-size="18" fill="#475569">膨胀</text>
    <rect x="695" y="70" width="180" height="180" rx="8" fill="#111827"/>
    <rect x="725" y="100" width="120" height="120" fill="#f8fafc"/>
    <text x="725" y="45" font-size="22" fill="#111827">前景扩大</text>
  </g>
</svg>
